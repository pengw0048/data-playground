# A KubeRay RayCluster for validating the dp_ray distributed backend on Kubernetes (e.g. kind) — the
# same multi-node byte-identical check as docker-compose.ray.yml, on real pods. Two workers, each its own
# pod/filesystem, so the worker-direct object-store handoff is exercised across nodes.
#
# Prereqs: a cluster (kind create cluster) + the KubeRay operator:
#   helm repo add kuberay https://ray-project.github.io/kuberay-helm/ && helm repo update
#   helm install kuberay-operator kuberay/kuberay-operator
# Run deploy/kuberay/validate.sh so a reused kind cluster receives a fresh image tag and fresh Job/pods.
# The checked-in dp-ray:local image below is only a render placeholder for that script.
#
# The image, this rayVersion field, and kernel[ray] are all pinned to 2.56.0. The driver rejects an
# unsupported/mixed cluster before data execution, and every worker validates the private shuffle ABI.
apiVersion: ray.io/v1
kind: RayCluster
metadata:
  name: dp-ray
spec:
  rayVersion: "2.56.0"
  headGroupSpec:
    rayStartParams:
      dashboard-host: "0.0.0.0"
      # Keep two logical CPUs per Ray node: Ray Data reserves a small coordinator fraction, so a
      # one-CPU node cannot admit its normal 1-CPU block tasks even while the host has free CPU.
      num-cpus: "2"
      resources: '"{\"engine_ray\": 100}"'
    template:
      spec:
        automountServiceAccountToken: false
        securityContext:
          runAsNonRoot: true
          runAsUser: 10001
          runAsGroup: 10001
          fsGroup: 10001
          seccompProfile: { type: RuntimeDefault }
        containers:
          - name: ray-head
            image: dp-ray:local
            imagePullPolicy: IfNotPresent
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
            resources:
              # Disposable kind sizing: leave room for Kubernetes, KubeRay, MinIO, and the driver on a
              # 4-CPU/8-GiB node. This is a validation profile, not production capacity guidance.
              requests: { cpu: "600m", memory: "1500Mi" }
              limits: { cpu: "2", memory: "2Gi" }
            volumeMounts:
              - { name: dshm, mountPath: /dev/shm }
        volumes:
          - name: dshm
            emptyDir: { medium: Memory, sizeLimit: 1Gi }
  workerGroupSpecs:
    - groupName: workers
      replicas: 2
      minReplicas: 2
      maxReplicas: 2
      rayStartParams:
        num-cpus: "2"
        resources: '"{\"engine_ray\": 100}"'
      template:
        spec:
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            fsGroup: 10001
            seccompProfile: { type: RuntimeDefault }
          containers:
            - name: ray-worker
              image: dp-ray:local
              imagePullPolicy: IfNotPresent
              securityContext:
                allowPrivilegeEscalation: false
                capabilities: { drop: ["ALL"] }
              resources:
                requests: { cpu: "600m", memory: "1500Mi" }
                limits: { cpu: "2", memory: "2Gi" }
              volumeMounts:
                - { name: dshm, mountPath: /dev/shm }
          volumes:
            - name: dshm
              emptyDir: { medium: Memory, sizeLimit: 1Gi }
