name: CI

# Auto-runs on push to main + on PRs — the repo is PUBLIC, so GitHub Actions minutes are free/unlimited.
# (Also manually triggerable via workflow_dispatch.) The per-job timeout caps below stay as hygiene so a
# hung run can't spin to the 6h default. You can still run the suites locally during dev
# (`cd kernel && uv run pytest -q`; `cd web && npm run e2e`).
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  kernel-tests:
    name: kernel (pytest — engine, plugins, agent)
    runs-on: ubuntu-latest
    timeout-minutes: 10  # cap billed minutes — kill a hung run instead of letting it burn to the 6h default
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      # The kernel wheel force-includes ../web/dist as kernel/_web; hatchling errors if that path
      # is missing at install time. The pytest job doesn't serve the SPA, so an empty dir suffices.
      - name: Placeholder web build (kernel doesn't serve the SPA in tests)
        run: mkdir -p web/dist
      - name: Install kernel (dev extra)
        run: cd kernel && uv sync --extra dev
      - name: Run tests
        run: cd kernel && uv run pytest -q

  e2e:
    name: e2e (Playwright — real UI on the real kernel)
    runs-on: ubuntu-latest
    timeout-minutes: 25  # cap billed minutes (the ~17-min job) so a hang can't drain the budget
    env:
      CI: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # web FIRST: the kernel wheel force-includes ../web/dist as kernel/_web, so the SPA must be
      # built before `uv sync` or hatchling errors ("Forced include not found").
      - name: Install web deps
        run: cd web && npm install
      - name: Unit tests (vitest — store + components)
        run: cd web && npm test
      - name: Build SPA
        run: cd web && npm run build
      # kernel: the Playwright webServer boots `dataplay` (needs uv + deps incl. anthropic via dev)
      - name: Install kernel
        run: cd kernel && uv sync --extra dev
      - name: Install Playwright browser
        run: cd web && npx playwright install --with-deps chromium
      - name: Run E2E
        run: cd web && npm run e2e
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7
