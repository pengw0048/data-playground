name: CI

# Required pull-request validation plus a lean integration run on `main`. Pull requests are not
# required to be rebased onto the latest default branch, so the push run proves the combined tree.
# The per-job timeout caps below stay as hygiene so a hung run can't spin to the 6h default. Run the
# same suites locally during development
# (`cd kernel && uv run pytest -q`; `cd web && npm run e2e`).
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege default for the functional CI suite. Adding this block is the
# only intentional change to this workflow for #113; jobs and steps are unchanged.
permissions:
  contents: read

jobs:
  kernel-tests:
    name: kernel (pytest — engine, plugins, agent)
    runs-on: ubuntu-latest
    timeout-minutes: 10  # cap billed minutes — kill a hung run instead of letting it burn to the 6h default
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      # The kernel wheel force-includes ../web/dist as kernel/_web; hatchling errors if that path
      # is missing at install time. The pytest job doesn't serve the SPA, so an empty dir suffices.
      - name: Placeholder web build (kernel doesn't serve the SPA in tests)
        run: mkdir -p web/dist
      - name: Install kernel (dev extra)
        run: cd kernel && uv sync --extra dev
      - name: Check committed OpenAPI contract
        run: cd kernel && uv run python -m hub.contracts.openapi --check
      - name: Run tests
        # Dump every thread if one test stalls for a minute. The job-level cap prevents runaway spend;
        # this makes an intermittent deadlock actionable instead of ending with only "operation canceled".
        run: cd kernel && uv run pytest -q -o faulthandler_timeout=60

  python-quality:
    # QA-01 / issue #111 — Ruff + basedpyright. No Ray, no browsers; a few minutes on ubuntu-latest.
    name: python quality (ruff + basedpyright)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      # hatchling force-includes ../web/dist; the quality job never serves the SPA.
      - name: Placeholder web build
        run: mkdir -p web/dist
      - name: Install kernel (dev extra — includes ruff + basedpyright)
        run: cd kernel && uv sync --extra dev
      - name: Ruff (kernel + examples/plugins)
        run: cd kernel && uv run ruff check --config pyproject.toml . ../examples/plugins
      - name: basedpyright (hub, lenient committed baseline)
        run: cd kernel && uv run basedpyright

  # QA-01 / #112: declared Python support is 3.11–3.13 via requires-python + classifiers, but
  # kernel/.python-version pins 3.12. This cheap matrix proves each declared version can install
  # from the lockfile, import the package / CLI entry point, and pass the core-contract subset.
  # The full suite stays on the pinned primary version in kernel-tests above — not in this matrix.
  # Local: cd kernel && uv run pytest -q hub/tests/test_graph_validation.py hub/tests/test_sqlpolicy.py hub/tests/test_migrations.py
  kernel-python-matrix:
    name: kernel (Python ${{ matrix.python }} — install/import/core-contract)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    env:
      # Override the committed kernel/.python-version pin for every uv invocation in this job.
      # Without this, `uv run` re-syncs the venv back to 3.12 and every matrix leg silently lies.
      UV_PYTHON: ${{ matrix.python }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: ${{ matrix.python }}
      # hatch_build.py creates a placeholder web/dist when missing, so no Node/npm steps here.
      - name: Install kernel (dev extra, lock-faithful)
        run: cd kernel && uv sync --frozen --extra dev
      - name: Prove the matrix interpreter is active
        # Bare `python -VV` on the runner is the system interpreter; uv run uses the venv.
        run: cd kernel && uv run python -VV
      - name: Import smoke
        run: |
          cd kernel
          uv run python -c "import hub"
          uv run dataplay --help
      - name: Core-contract subset
        # Explicit path list (graph structure validation, SQL AST policy, SQLite migration
        # startup contracts). Intentionally no Ray, browser, Node, or PostgreSQL.
        run: >-
          cd kernel && uv run pytest -q
          hub/tests/test_graph_validation.py
          hub/tests/test_sqlpolicy.py
          hub/tests/test_migrations.py

  postgres-migration:
    name: migration and lifecycle contracts (PostgreSQL 16)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine@sha256:e013e867e712fec275706a6c51c966f0bb0c93cfa8f51000f85a15f9865a28cb
        env:
          POSTGRES_USER: dp
          POSTGRES_PASSWORD: dp-test-only
          POSTGRES_DB: dataplay_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dp -d dataplay_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
    env:
      DP_TEST_DATABASE_URL: postgresql+psycopg://dp:dp-test-only@127.0.0.1:5432/dataplay_test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      - name: Placeholder web build
        run: mkdir -p web/dist
      - name: Install kernel with PostgreSQL support
        run: cd kernel && uv sync --extra dev --extra postgres
      - name: Verify the release migration contract
        run: cd kernel && uv run pytest -q hub/tests/test_postgres_migration_smoke.py
      - name: Verify durable lifecycle concurrency contracts
        run: >-
          cd kernel && uv run pytest -q -o faulthandler_timeout=60
          hub/tests/test_backend_recovery_fences.py
          hub/tests/test_backend_sink_cleanup.py
          hub/tests/test_backend_source_pins.py
          hub/tests/test_catalog_folders.py
          hub/tests/test_lineage_facts.py
          hub/tests/test_settings_batches.py
          hub/tests/test_run_identity.py
          hub/tests/test_object_lifecycle.py
          hub/tests/test_workspace_storage.py
      - name: Verify durable Ray Jobs lifecycle on PostgreSQL
        # The PostgreSQL-gated Ray Jobs races skip on SQLite, so kernel-tests never runs them; select
        # them here by name so a regression cannot pass CI while every check stays green.
        run: >-
          cd kernel && uv run pytest -q -o faulthandler_timeout=60
          hub/tests/test_ray_jobs.py -k postgres

  backup-restore-drill:
    name: backup/restore drill (PostgreSQL 16)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine@sha256:e013e867e712fec275706a6c51c966f0bb0c93cfa8f51000f85a15f9865a28cb
        env:
          POSTGRES_USER: dp
          POSTGRES_PASSWORD: dp-test-only
          POSTGRES_DB: dataplay_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dp -d dataplay_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
    env:
      DP_TEST_DATABASE_URL: postgresql+psycopg://dp:dp-test-only@127.0.0.1:5432/dataplay_test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      - name: Placeholder web build
        run: mkdir -p web/dist
      - name: Install PostgreSQL client tools
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Install kernel with PostgreSQL support
        run: cd kernel && uv sync --extra dev --extra postgres
      - name: Run isolated restore drill
        # -s keeps BACKUP_RESTORE_DRILL RPO/RTO evidence lines in the job log.
        run: cd kernel && uv run pytest -s -q hub/tests/test_backup_restore_drill.py::test_postgres_object_store_isolated_restore_drill

  e2e:
    name: e2e (Playwright — real UI on the real kernel)
    runs-on: ubuntu-latest
    timeout-minutes: 25  # cap billed minutes (the ~17-min job) so a hang can't drain the budget
    env:
      CI: "true"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
      # web FIRST: the kernel wheel force-includes ../web/dist as kernel/_web, so the SPA must be
      # built before `uv sync` or hatchling errors ("Forced include not found").
      - name: Install web deps
        run: cd web && npm install
      - name: Unit tests (vitest — store + components)
        run: cd web && npm test
      - name: Build SPA
        run: cd web && npm run build
      # kernel: the Playwright webServer boots `dataplay` (needs uv + deps incl. anthropic via dev)
      - name: Install kernel
        run: cd kernel && uv sync --extra dev
      - name: Install Playwright browser
        run: cd web && npx playwright install --with-deps chromium
      # The Playwright project DAG runs the tagged researcher smoke first, the remaining Chromium
      # suite second, and the minimum-viewport project last, without executing smoke fixtures twice.
      - name: Run E2E (UX smoke first)
        run: cd web && npm run e2e
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7
