name: CI

# Required pull-request validation plus a lean integration run on `main`. Pull requests are not
# required to be rebased onto the latest default branch, so the push run proves the combined tree.
# The per-job timeout caps below stay as hygiene so a hung run can't spin to the 6h default. Run the
# same suites locally during development
# (`cd kernel && uv run pytest -q`; `cd web && npm run e2e`).
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege default for the functional CI suite. Adding this block is the
# only intentional change to this workflow for #113; jobs and steps are unchanged.
permissions:
  contents: read

jobs:
  kernel-shards:
    # One isolated pytest process per shard, each on its own runner instead of three processes
    # oversubscribing a single two-core runner (which both starved worker threads and left the
    # remainder shard's ~11min single-process straggler bounding the whole check). Every shard keeps
    # its own SQLite DB (conftest) and seeded-data dir. `kernel-tests` below aggregates them into the
    # single required status check.
    name: kernel pytest shard (${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 12  # each shard is a fraction of the suite; headroom over the ~6min long pole
    strategy:
      fail-fast: false  # one failing shard must not hide failures in the others
      matrix:
        shard: [kernel, lifecycle, remainder-0, remainder-1, remainder-2]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      # The kernel wheel force-includes ../web/dist as kernel/_web; hatchling errors if that path
      # is missing at install time. The pytest job doesn't serve the SPA, so an empty dir suffices.
      - name: Placeholder web build (kernel doesn't serve the SPA in tests)
        run: mkdir -p web/dist
      - name: Install kernel (dev extra)
        run: cd kernel && uv sync --extra dev
      - name: Check committed OpenAPI contract
        run: cd kernel && uv run python -m hub.contracts.openapi --check
      - name: Run shard ${{ matrix.shard }}
        # test_kernel.py is its own shard (a monolith can't be split further); ray_jobs +
        # object_lifecycle share the lifecycle shard. The rest is split into three time-balanced
        # groups from measured per-file durations (one heavy CPU-bound file dominates, so a naive
        # by-name split leaves a straggler). remainder-0/-1 are explicit; remainder-2 is the
        # complement, so any newly added test file lands there and is never silently dropped.
        shell: bash
        run: |
          set -uo pipefail
          cd kernel
          export DP_DATA_DIR="$RUNNER_TEMP/dp-test-data-${{ matrix.shard }}"
          dedicated="test_kernel.py test_ray_jobs.py test_object_lifecycle.py"
          group_0="test_api_contract.py test_backend_source_pins.py test_backup_restore_drill.py
            test_body_limit.py test_bounded_fanout_plan.py test_bounded_fanout_write_tasks.py
            test_catalog_folders.py test_ci_workflow_policy.py test_dataset_revisions.py
            test_durable_external_wait_tasks.py test_durable_local_write_tasks.py
            test_execution_manifests.py test_external_wait.py test_kernel_status.py
            test_local_named_outputs.py test_local_run_input_admission.py test_merge_columns.py
            test_migrations.py test_native_canvas.py test_observability_contracts.py
            test_plugin_status.py test_plugin_wheel_conformance.py test_promoted_transform_versions.py
            test_run_authz.py test_subprocess_process_groups.py test_task_inbox.py
            test_task_inbox_api.py test_workload_env.py test_write_admission.py"
          group_1="test_agent_data_policy.py test_backend_recovery_fences.py test_canvas_copy.py
            test_canvas_roles.py test_checkpoint_conformance.py test_creds.py test_dataset_views.py
            test_graph_validation.py test_http_filesystem_policy.py test_lance_append_durable_writes.py
            test_lineage_execution.py test_linear_checkpoint_admission.py test_linear_checkpoint_tasks.py
            test_local_result_lifecycle.py test_managed_local_file_revisions.py test_managed_source_e2e.py
            test_managed_source_lifecycle.py test_mcp_http.py test_named_output_process_runners.py
            test_preview_boundary.py test_profile_process_runner.py test_region_object_lifecycle.py
            test_run_identity.py test_secret_refs.py test_sparse_outputs.py test_sqlpolicy.py
            test_transform_library_ux.py test_ux_release_gate.py"
          case "${{ matrix.shard }}" in
            kernel)      names="test_kernel.py" ;;
            lifecycle)   names="test_ray_jobs.py test_object_lifecycle.py" ;;
            remainder-0) names="$group_0" ;;
            remainder-1) names="$group_1" ;;
            remainder-2) names=$(comm -23 \
                          <(find hub/tests -name 'test_*.py' -exec basename {} \; | sort) \
                          <(printf '%s\n' $dedicated $group_0 $group_1 | sort)) ;;
          esac
          files=$(printf 'hub/tests/%s ' $names)
          test -n "$names"  # a shard that selected nothing is a bug, not an empty pass
          uv run pytest -q -o faulthandler_timeout=60 --durations=25 $files

  kernel-tests:
    # Aggregates the sharded pytest matrix into the one required status check named in branch
    # protection, so splitting the suite across runners doesn't change the required check.
    name: kernel (pytest — engine, plugins, agent)
    runs-on: ubuntu-latest
    needs: kernel-shards
    if: always()
    timeout-minutes: 5
    steps:
      - name: Require every pytest shard to pass
        run: |
          if [ "${{ needs.kernel-shards.result }}" != "success" ]; then
            echo "kernel pytest shards did not all pass: ${{ needs.kernel-shards.result }}"
            exit 1
          fi

  python-quality:
    # QA-01 / issue #111 — Ruff + basedpyright. No Ray, no browsers; a few minutes on ubuntu-latest.
    name: python quality (ruff + basedpyright)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      # hatchling force-includes ../web/dist; the quality job never serves the SPA.
      - name: Placeholder web build
        run: mkdir -p web/dist
      - name: Install kernel (dev extra — includes ruff + basedpyright)
        run: cd kernel && uv sync --extra dev
      - name: Ruff (kernel + examples/plugins)
        run: cd kernel && uv run ruff check --config pyproject.toml . ../examples/plugins
      - name: basedpyright (hub, lenient committed baseline)
        run: cd kernel && uv run basedpyright

  # QA-01 / #112: declared Python support is 3.11–3.13 via requires-python + classifiers, but
  # kernel/.python-version pins 3.12. This cheap matrix proves each declared version can install
  # from the lockfile, import the package / CLI entry point, and pass the core-contract subset.
  # The full suite stays on the pinned primary version in the kernel pytest shards above — not here.
  # Local: cd kernel && uv run pytest -q hub/tests/test_graph_validation.py hub/tests/test_sqlpolicy.py hub/tests/test_migrations.py
  kernel-python-matrix:
    name: kernel (Python ${{ matrix.python }} — install/import/core-contract)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    env:
      # Override the committed kernel/.python-version pin for every uv invocation in this job.
      # Without this, `uv run` re-syncs the venv back to 3.12 and every matrix leg silently lies.
      UV_PYTHON: ${{ matrix.python }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: ${{ matrix.python }}
      # hatch_build.py creates a placeholder web/dist when missing, so no Node/npm steps here.
      - name: Install kernel (dev extra, lock-faithful)
        run: cd kernel && uv sync --frozen --extra dev
      - name: Prove the matrix interpreter is active
        # Bare `python -VV` on the runner is the system interpreter; uv run uses the venv.
        run: cd kernel && uv run python -VV
      - name: Import smoke
        run: |
          cd kernel
          uv run python -c "import hub"
          uv run dataplay --help
      - name: Core-contract subset
        # Explicit path list (graph structure validation, SQL AST policy, SQLite migration
        # startup contracts). Intentionally no Ray, browser, Node, or PostgreSQL.
        run: >-
          cd kernel && uv run pytest -q
          hub/tests/test_graph_validation.py
          hub/tests/test_sqlpolicy.py
          hub/tests/test_migrations.py

  postgres-migration:
    name: migration and lifecycle contracts (PostgreSQL 16)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine@sha256:e013e867e712fec275706a6c51c966f0bb0c93cfa8f51000f85a15f9865a28cb
        env:
          POSTGRES_USER: dp
          POSTGRES_PASSWORD: dp-test-only
          POSTGRES_DB: dataplay_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dp -d dataplay_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
    env:
      DP_TEST_DATABASE_URL: postgresql+psycopg://dp:dp-test-only@127.0.0.1:5432/dataplay_test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      - name: Placeholder web build
        run: mkdir -p web/dist
      - name: Install kernel with PostgreSQL support
        run: cd kernel && uv sync --extra dev --extra postgres
      - name: Verify the release migration contract
        run: cd kernel && uv run pytest -q hub/tests/test_postgres_migration_smoke.py
      - name: Verify durable lifecycle concurrency contracts
        run: >-
          cd kernel && uv run pytest -q -o faulthandler_timeout=60
          hub/tests/test_backend_recovery_fences.py
          hub/tests/test_backend_sink_cleanup.py
          hub/tests/test_backend_source_pins.py
          hub/tests/test_catalog_folders.py
          hub/tests/test_lineage_facts.py
          hub/tests/test_settings_batches.py
          hub/tests/test_run_identity.py
          hub/tests/test_object_lifecycle.py
          hub/tests/test_workspace_storage.py
          hub/tests/test_native_canvas.py
      - name: Verify promoted Transform versions on PostgreSQL
        run: >-
          cd kernel && uv run pytest -q -o faulthandler_timeout=60
          hub/tests/test_promoted_transform_versions.py
      - name: Verify DatasetViews on PostgreSQL
        run: >-
          cd kernel && uv run pytest -q -o faulthandler_timeout=60
          hub/tests/test_dataset_views.py
      - name: Verify DatasetView distribution reports on PostgreSQL
        run: >-
          cd kernel && uv run pytest -q -o faulthandler_timeout=60
          hub/tests/test_distribution_reports.py
      - name: Verify typed local write contracts on PostgreSQL
        run: >-
          cd kernel && uv run pytest -q -o faulthandler_timeout=60
          hub/tests/test_managed_local_file_revisions.py -k typed_local
          && uv run pytest -q -o faulthandler_timeout=60 hub/tests/test_row_identity.py
      - name: Verify exact ordinary local input admission on PostgreSQL
        run: >-
          cd kernel && uv run pytest -q -o faulthandler_timeout=60
          hub/tests/test_local_run_input_admission.py
          hub/tests/test_durable_local_write_tasks.py -k postgres
      - name: Verify managed local Lance append contracts on PostgreSQL
        run: >-
          cd kernel && uv run pytest -q -o faulthandler_timeout=60
          hub/tests/test_managed_local_lance_writes.py
      - name: Verify durable external wait contracts on PostgreSQL
        run: cd kernel && uv run pytest -q hub/tests/test_durable_external_wait_tasks.py
      - name: Verify hidden linear checkpoint contracts on PostgreSQL
        run: >-
          cd kernel && uv run pytest -q -o faulthandler_timeout=60
          hub/tests/test_linear_checkpoint_admission.py
          hub/tests/test_linear_checkpoint_commit.py
          hub/tests/test_linear_checkpoint_lifecycle.py
      - name: Verify durable SparseOutput merge ownership on PostgreSQL
        # These named races are PostgreSQL-gated and must not disappear behind the SQLite skip.
        run: >-
          cd kernel && uv run pytest -q -o faulthandler_timeout=60
          hub/tests/test_merge_columns.py -k postgres
          && uv run pytest -q -o faulthandler_timeout=60
          hub/tests/test_merge_columns_api.py -k postgres
      - name: Verify bounded fan-out plan and runtime contracts on PostgreSQL
        # #415 close bar's "combined proof on PG" — the fan-out slot pool / fencing / GC only exercise
        # real duplicate-owner + varchar(32) semantics on PostgreSQL, not SQLite.
        run: >-
          cd kernel && uv run pytest -q -o faulthandler_timeout=60
          hub/tests/test_bounded_fanout_plan.py
          hub/tests/test_bounded_fanout_write_tasks.py
      - name: Verify durable Ray Jobs lifecycle on PostgreSQL
        # The PostgreSQL-gated Ray Jobs races skip on SQLite, so the kernel pytest shards never run them; select
        # them here by name so a regression cannot pass CI while every check stays green.
        run: >-
          cd kernel && uv run pytest -q -o faulthandler_timeout=60
          hub/tests/test_ray_jobs.py -k postgres

  backup-restore-drill:
    name: backup/restore drill (PostgreSQL 16)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine@sha256:e013e867e712fec275706a6c51c966f0bb0c93cfa8f51000f85a15f9865a28cb
        env:
          POSTGRES_USER: dp
          POSTGRES_PASSWORD: dp-test-only
          POSTGRES_DB: dataplay_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dp -d dataplay_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
    env:
      DP_TEST_DATABASE_URL: postgresql+psycopg://dp:dp-test-only@127.0.0.1:5432/dataplay_test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      - name: Placeholder web build
        run: mkdir -p web/dist
      - name: Install PostgreSQL client tools
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Install kernel with PostgreSQL support
        run: cd kernel && uv sync --extra dev --extra postgres
      - name: Run isolated restore drill
        # -s keeps BACKUP_RESTORE_DRILL RPO/RTO evidence lines in the job log.
        run: cd kernel && uv run pytest -s -q hub/tests/test_backup_restore_drill.py::test_postgres_object_store_isolated_restore_drill

  e2e:
    name: e2e (Playwright — real UI on the real kernel)
    runs-on: ubuntu-latest
    timeout-minutes: 25  # cap billed minutes (the ~17-min job) so a hang can't drain the budget
    env:
      CI: "true"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
      # web FIRST: the kernel wheel force-includes ../web/dist as kernel/_web, so the SPA must be
      # built before `uv sync` or hatchling errors ("Forced include not found").
      - name: Install web deps
        run: cd web && npm install
      - name: Build SPA
        run: cd web && npm run build
      # kernel: the Playwright webServer boots `dataplay` (needs uv + deps incl. anthropic via dev)
      - name: Install kernel
        run: cd kernel && uv sync --extra dev
      # Cache the browser binary and skip --with-deps: the ubuntu-latest image already ships
      # Chromium's shared libraries, so only the ~120MB download is worth avoiding on a cache hit.
      - name: Resolve Playwright version
        id: playwright
        run: echo "version=$(node -p "require('./web/node_modules/@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browser
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright.outputs.version }}
      - name: Install Playwright browser
        run: cd web && npx playwright install chromium
      # The Playwright project DAG runs the tagged researcher smoke first, the remaining Chromium
      # suite second, and the minimum-viewport project last, without executing smoke fixtures twice.
      - name: Run E2E (UX smoke first)
        run: cd web && npm run e2e
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

  web-unit:
    name: web unit (vitest — store + components)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
      - name: Install web deps
        run: cd web && npm install
      - name: Unit tests (vitest — store + components)
        run: cd web && npm test
