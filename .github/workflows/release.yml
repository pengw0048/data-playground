name: Release

# Tag-triggered release contract (issue #115 / REL-01 slice 11).
# Reuses the build-and-smoke jobs from release-artifacts.yml, then publishes the wheel,
# SHA256SUMS, SBOMs, GHCR image, and build-provenance attestations to a GitHub Release.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build + smoke only (skip publish/attest)"
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Re-run the slice-10 contract on the tagged commit (reusable workflow).
  artifacts:
    uses: ./.github/workflows/release-artifacts.yml
    permissions:
      contents: read

  publish:
    name: publish release + SBOM + attestations
    needs: [artifacts]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: write
      id-token: write
      attestations: write
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Resolve version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          V="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "image=${REGISTRY}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          # Fail closed if tag disagrees with package manifests (extends slice-10 identity check).
          python3 scripts/check_release_versions.py \
            --pyproject kernel/pyproject.toml \
            --package-json web/package.json \
            --git-tag \
            --require pyproject,package_json,tag

      - name: Download wheel artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: data-playground-wheel
          path: dist

      - name: Resolve wheel path
        id: wheel
        run: |
          WHEEL=$(ls dist/*.whl | head -n 1)
          test -n "$WHEEL"
          echo "path=$WHEEL" >> "$GITHUB_OUTPUT"
          echo "wheel=$WHEEL"
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push application image
        id: image
        run: |
          IMAGE="${{ steps.ver.outputs.image }}"
          VERSION="${{ steps.ver.outputs.version }}"
          docker build \
            --build-arg "DP_VERSION=${VERSION}" \
            --build-arg "DP_GIT_SHA=${GITHUB_SHA}" \
            -t "${IMAGE}:${VERSION}" \
            -t "${IMAGE}:${{ steps.ver.outputs.tag }}" \
            -t "${IMAGE}:latest" \
            .
          docker push "${IMAGE}:${VERSION}"
          docker push "${IMAGE}:${{ steps.ver.outputs.tag }}"
          docker push "${IMAGE}:latest"
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${IMAGE}:${VERSION}" | awk -F@ '{print $2}')
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "pushed ${IMAGE}:${VERSION} @ ${DIGEST}"
          # Container /api/version identity: run briefly and assert.
          docker run -d --name dp-release-ver -p 8473:8471 "${IMAGE}:${VERSION}"
          for i in $(seq 1 60); do
            curl -fsS --max-time 2 http://127.0.0.1:8473/api/livez >/dev/null 2>&1 && break
            sleep 1
          done
          python3 scripts/release_smoke.py \
            --base-url http://127.0.0.1:8473 \
            --expect-version "${VERSION}" \
            --expect-sha-not-unknown \
            --ready-timeout 180
          curl -fsS http://127.0.0.1:8473/api/version > /tmp/release-api-version.json
          docker rm -f dp-release-ver
          LABEL=$(docker inspect --format '{{index .Config.Labels "org.opencontainers.image.version"}}' "${IMAGE}:${VERSION}")
          python3 scripts/check_release_versions.py \
            --pyproject kernel/pyproject.toml \
            --package-json web/package.json \
            --wheel "${{ steps.wheel.outputs.path }}" \
            --api-version-json /tmp/release-api-version.json \
            --image-label "${LABEL}" \
            --git-tag \
            --require pyproject,package_json,wheel,api,image,tag

      - name: Generate SBOM for the wheel
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          file: ${{ steps.wheel.outputs.path }}
          format: spdx-json
          output-file: dist/data-playground-wheel.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Generate SBOM for the application image
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ steps.ver.outputs.image }}:${{ steps.ver.outputs.version }}
          format: spdx-json
          output-file: dist/data-playground-image.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Write SHA256SUMS
        run: |
          cd dist
          # Cover every attached release artifact except the sums file itself.
          sha256sum *.whl *.spdx.json | tee SHA256SUMS
          sha256sum -c SHA256SUMS

      - name: Attest wheel provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ steps.wheel.outputs.path }}
      - name: Attest image provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ steps.ver.outputs.image }}
          subject-digest: ${{ steps.image.outputs.digest }}
          push-to-registry: true

      - name: Extract release notes from CHANGELOG
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re, os
          version = os.environ["VERSION"]
          text = Path("CHANGELOG.md").read_text(encoding="utf-8")
          # Grab ## [version] … until next ## [
          pat = rf"(?ms)^## \[({re.escape(version)})\].*?(?=^## \[|\Z)"
          m = re.search(pat, text)
          if not m:
              raise SystemExit(f"CHANGELOG.md has no section for {version}")
          notes = m.group(0).strip() + "\n"
          Path("dist/RELEASE_NOTES.md").write_text(notes, encoding="utf-8")
          print(notes[:500], "…")
          PY
        env:
          VERSION: ${{ steps.ver.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Data Playground ${{ steps.ver.outputs.version }}
          body_path: dist/RELEASE_NOTES.md
          files: |
            dist/*.whl
            dist/SHA256SUMS
            dist/data-playground-wheel.spdx.json
            dist/data-playground-image.spdx.json
          fail_on_unmatched_files: true
