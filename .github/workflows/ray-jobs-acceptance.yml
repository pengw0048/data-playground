name: Ray Jobs acceptance

on:
  pull_request:
    paths:
      # Image and dependency contract shared by both Ray acceptance suites.
      - ".dockerignore"
      - "docker/ray/**"
      - "kernel/hatch_build.py"
      - "kernel/pyproject.toml"
      - "kernel/uv.lock"
      - "examples/plugins/dp_ray/**"
      - "kernel/hub/ray_compat.py"
      # Execution, storage, destination, and plugin contracts exercised by dp_ray.
      - "kernel/hub/backends.py"
      - "kernel/hub/compiler.py"
      - "kernel/hub/db.py"
      - "kernel/hub/deps.py"
      - "kernel/hub/destinations.py"
      - "kernel/hub/graph.py"
      - "kernel/hub/handoff.py"
      - "kernel/hub/ir.py"
      - "kernel/hub/job_artifacts.py"
      - "kernel/hub/metadb.py"
      - "kernel/hub/models.py"
      - "kernel/hub/nodespecs.py"
      - "kernel/hub/paths.py"
      - "kernel/hub/placement.py"
      - "kernel/hub/sandbox.py"
      - "kernel/hub/secrets.py"
      - "kernel/hub/settings.py"
      - "kernel/hub/sinks.py"
      - "kernel/hub/sqlanalyze.py"
      - "kernel/hub/sqlpolicy.py"
      - "kernel/hub/storage.py"
      - "kernel/hub/workload_*.py"
      - "kernel/hub/executors/engine.py"
      - "kernel/hub/plugins/adapters.py"
      - "kernel/hub/plugins/catalog.py"
      - "kernel/hub/plugins/capabilities.py"
      - "kernel/hub/plugins/default_catalog.py"
      - "kernel/hub/plugins/processors.py"
      - "kernel/hub/plugins/runner.py"
      # Jobs admission, durable lifecycle, and real-service acceptance harness.
      - ".github/workflows/ray-jobs-acceptance.yml"
      - "docker-compose.ray-jobs.yml"
      - "scripts/ray-jobs-acceptance.sh"
      - "kernel/hub/ray_jobs_acceptance.py"
      - "kernel/hub/ray_jobs_acceptance_entrypoint.py"
      - "kernel/hub/routers/runs.py"
      - "kernel/hub/run_controller.py"
      - "kernel/hub/planner.py"
      - "kernel/hub/estimate.py"
      - "kernel/hub/executors/schema.py"
      - "kernel/hub/cli.py"
      - "kernel/hub/migrations/**"
  workflow_dispatch:
  workflow_call:
  schedule:
    - cron: "43 6 * * 3"

permissions:
  contents: read

concurrency:
  group: ray-jobs-acceptance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lifecycle:
    name: Restart, cancel, and result integrity
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      COMPOSE_PROJECT_NAME: dp-ray-jobs-${{ github.run_id }}-${{ github.run_attempt }}
      DP_RAY_JOBS_DIAGNOSTICS_DIR: ${{ github.workspace }}/ray-jobs-diagnostics

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build the shared Ray image (layer-cached)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: docker/ray/Dockerfile
          tags: dp-ray:local
          load: true
          cache-from: type=gha,scope=ray-image
          cache-to: type=gha,mode=max,scope=ray-image

      - name: Run real Ray Jobs lifecycle acceptance
        run: scripts/ray-jobs-acceptance.sh

      - name: Upload lifecycle diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ray-jobs-acceptance-${{ github.run_id }}-${{ github.run_attempt }}
          path: ray-jobs-diagnostics/
          if-no-files-found: warn
          retention-days: 14
