name: In-place upgrade drill

# Release-tier certification only: do not run this expensive real-artifact upgrade on PRs or pushes.
on:
  schedule:
    - cron: "37 4 * * 1"
  workflow_dispatch:
  workflow_call:
    inputs:
      expected_sha:
        description: Immutable candidate commit to build and certify.
        required: true
        type: string

permissions:
  contents: read

jobs:
  upgrade:
    name: v0.1.0 to candidate (SQLite + PostgreSQL)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    services:
      postgres:
        image: postgres:16-alpine@sha256:e013e867e712fec275706a6c51c966f0bb0c93cfa8f51000f85a15f9865a28cb
        env:
          POSTGRES_USER: dp
          POSTGRES_PASSWORD: dp-test-only
          POSTGRES_DB: upgrade_drill
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dp -d upgrade_drill"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.expected_sha || github.sha }}
      - name: Bind checkout to the exact candidate
        run: test "$(git rev-parse HEAD)" = "${{ inputs.expected_sha || github.sha }}"
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Build the candidate wheel
        run: |
          cd web
          npm ci
          npm run build
          cd ../kernel
          uv build --wheel --out-dir dist
      - name: Upgrade the real SQLite workspace
        run: |
          mkdir /tmp/dp-upgrade-sqlite
          python3 scripts/upgrade_drill.py \
            --backend sqlite \
            --candidate-wheel kernel/dist/*.whl \
            --candidate-sha "$(git rev-parse HEAD)" \
            --work-root /tmp/dp-upgrade-sqlite \
            --evidence-out /tmp/upgrade-evidence/sqlite.json
      - name: Upgrade the PostgreSQL metadata workspace
        env:
          POSTGRES_URL: postgresql://dp@127.0.0.1:5432/upgrade_drill
          PGPASSWORD: dp-test-only
        run: |
          mkdir /tmp/dp-upgrade-postgres
          python3 scripts/upgrade_drill.py \
            --backend postgres \
            --candidate-wheel kernel/dist/*.whl \
            --candidate-sha "$(git rev-parse HEAD)" \
            --postgres-url "$POSTGRES_URL" \
            --work-root /tmp/dp-upgrade-postgres \
            --evidence-out /tmp/upgrade-evidence/postgres.json
      - name: Retain bounded release evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: in-place-upgrade-evidence
          path: /tmp/upgrade-evidence/*.json
          if-no-files-found: error
          retention-days: 30
