name: Ray validation

on:
  pull_request:
    paths:
      # Run the real cluster for runtime inputs, not documentation or unit-test-only changes.
      - ".github/workflows/ray-validation.yml"
      - "docker-compose.ray.yml"
      - "docker/ray/**"
      - "deploy/kuberay/differential-job.yaml"
      - "deploy/kuberay/minio.yaml"
      - "deploy/kuberay/raycluster.yaml"
      - "deploy/kuberay/validate.sh"
      - "examples/plugins/dp_ray/**"
      - "kernel/pyproject.toml"
      - "kernel/uv.lock"
      - "kernel/hub/backends.py"
      - "kernel/hub/compiler.py"
      - "kernel/hub/db.py"
      - "kernel/hub/deps.py"
      - "kernel/hub/graph.py"
      - "kernel/hub/handoff.py"
      - "kernel/hub/ir.py"
      - "kernel/hub/metadb.py"
      - "kernel/hub/models.py"
      - "kernel/hub/placement.py"
      - "kernel/hub/ray_*.py"
      - "kernel/hub/sandbox.py"
      - "kernel/hub/sinks.py"
      - "kernel/hub/sqlanalyze.py"
      - "kernel/hub/sqlpolicy.py"
      - "kernel/hub/storage.py"
      - "kernel/hub/workload_env.py"
      - "kernel/hub/executors/**"
      - "kernel/hub/plugins/**"
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * 1"

permissions:
  contents: read

concurrency:
  group: ray-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Cheap OPS-02 gate: prove the Ray image builds reproducibly and the dp_ray version handshake
  # accepts the image itself. Independent of the heavy multi-node differential matrix below.
  image-smoke:
    name: Ray image smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      COMPOSE_PROJECT_NAME: dp-ray-smoke-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build Ray image
        run: docker compose -f docker-compose.ray.yml build ray-head

      - name: Require non-root uid and pinned Ray CLI
        run: |
          set -euo pipefail
          uid=$(docker run --rm dp-ray:local id -u)
          test "$uid" = "10001"
          docker run --rm dp-ray:local ray --version | tee /tmp/ray-version.txt
          grep -Fq "2.56.0" /tmp/ray-version.txt

      - name: Require the runtime version handshake inside a single-node Ray
        run: |
          set -euo pipefail
          # One container = one Ray head. Exercising validate_ray_cluster here catches an image that
          # built cleanly but shipped the wrong Ray before the 40-minute differential pays for it.
          docker run --rm --shm-size=1gb dp-ray:local /bin/sh -ec '
            ray start --head --num-cpus=1 --object-store-memory=536870912 --dashboard-host=0.0.0.0
            python -c "import ray; from hub.ray_compat import validate_ray_cluster; ray.init(address=\"auto\", configure_logging=False, log_to_driver=False); report = validate_ray_cluster(ray); print(\"version handshake OK:\", \", \".join(f\"{n}={v}\" for n, v in report.items())); ray.shutdown()"
            ray stop >/dev/null 2>&1
          '

  multi-node-differential:
    name: Ray (${{ matrix.scenario }})
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        scenario:
          - clean-and-degraded
          - default-shuffle
          - fault-controls
    env:
      COMPOSE_PROJECT_NAME: dp-ray-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.scenario }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate Compose configuration
        run: docker compose -f docker-compose.ray.yml config -q

      - name: Build and start head, two workers, and MinIO
        run: |
          set -o pipefail
          mkdir -p ray-diagnostics
          # Finish the shared image first. Building while `up` creates multiple services can leave a
          # running head on an earlier image ID; a later `compose run` may then recreate the head and
          # silently replace the GCS cluster identity under the workers.
          docker compose -f docker-compose.ray.yml build ray-head
          # Ray 2.56 GPU scheduling semantics can be checked with logical resources; no NVIDIA runtime
          # or fake GPU declaration is added to the CPU-only Compose/KubeRay validation clusters.
          docker run --rm --shm-size=1g dp-ray:local \
            python -m hub.ray_gpu_contract_check 2>&1 | tee ray-diagnostics/gpu-contract.log
          docker compose -f docker-compose.ray.yml up -d --no-build --scale ray-worker=2 ray-head ray-worker minio createbucket
          docker compose -f docker-compose.ray.yml ps -a | tee ray-diagnostics/startup-ps.txt

      - name: Require the head and both workers to register
        run: |
          registered=0
          for _ in $(seq 1 60); do
            registered=$(docker compose -f docker-compose.ray.yml exec -T ray-head python -c \
              'import ray; ray.init(address="auto", configure_logging=False, log_to_driver=False); print(sum(1 for n in ray.nodes() if n.get("Alive") and n.get("Resources", {}).get("CPU", 0) > 0))' \
              2>/dev/null | tail -1) || true
            if [ "$registered" -ge 3 ] 2>/dev/null; then
              break
            fi
            sleep 2
          done
          if [ "$registered" -lt 3 ] 2>/dev/null; then
            echo "Expected a Ray head plus two registered workers; observed $registered CPU-bearing nodes."
            exit 1
          fi
          echo "Ray head and two workers registered."

      - name: Require a clean distributed PASS
        if: matrix.scenario == 'clean-and-degraded'
        run: |
          set -o pipefail
          DP_MULTINODE_FAULT= docker compose -f docker-compose.ray.yml run --rm --no-deps driver 2>&1 | tee ray-diagnostics/clean.log

      - name: Require the default shuffle-partition path
        if: matrix.scenario == 'default-shuffle'
        run: |
          set -o pipefail
          docker compose -f docker-compose.ray.yml run --rm --no-deps \
            -e DP_RAY_SHUFFLE_PARTITIONS=0 -e DP_MULTINODE_FAULT= driver 2>&1 \
            | tee ray-diagnostics/default-shuffle.log

      - name: Require every fault control to fail
        if: matrix.scenario == 'fault-controls'
        run: |
          for fault in schema rows join; do
            case "$fault" in
              schema) expected="FAIL: cluster aggregate SCHEMA != DuckDB" ;;
              rows) expected="FAIL: cluster aggregate != DuckDB" ;;
              join) expected="FAIL: cluster broadcast join != DuckDB" ;;
            esac
            set +e
            DP_MULTINODE_FAULT="$fault" docker compose -f docker-compose.ray.yml run --rm --no-deps driver 2>&1 | tee "ray-diagnostics/fault-$fault.log"
            rc=${PIPESTATUS[0]}
            set -e
            if [ "$rc" -eq 0 ]; then
              echo "Fault control '$fault' unexpectedly passed; the differential oracle is not trustworthy."
              exit 1
            fi
            if ! grep -Fq "$expected" "ray-diagnostics/fault-$fault.log"; then
              echo "Fault control '$fault' failed for the wrong reason; expected marker: $expected"
              exit 1
            fi
            echo "Fault control '$fault' failed as required (exit $rc)."
          done

      - name: Require a degraded-cluster rerun after one worker stops
        if: matrix.scenario == 'clean-and-degraded'
        run: |
          set -o pipefail
          workers=$(docker compose -f docker-compose.ray.yml ps -q ray-worker)
          worker_count=$(printf '%s\n' "$workers" | sed '/^$/d' | wc -l)
          if [ "$worker_count" -ne 2 ]; then
            echo "Expected exactly two worker containers, found $worker_count."
            exit 1
          fi
          victim=$(printf '%s\n' "$workers" | sed -n '2p')
          docker kill "$victim"
          echo "Stopped worker $victim between runs. This checks a fresh degraded-cluster run, not in-flight recovery."
          DP_MULTINODE_FAULT= docker compose -f docker-compose.ray.yml run --rm --no-deps driver 2>&1 | tee ray-diagnostics/degraded-rerun.log

      - name: Capture Ray diagnostics
        if: always()
        continue-on-error: true
        run: |
          mkdir -p ray-diagnostics
          docker compose -f docker-compose.ray.yml ps -a > ray-diagnostics/final-ps.txt 2>&1
          docker compose -f docker-compose.ray.yml logs --no-color > ray-diagnostics/compose.log 2>&1
          docker info > ray-diagnostics/docker-info.txt 2>&1
          df -h > ray-diagnostics/disk.txt 2>&1

      - name: Upload Ray diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ray-validation-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.scenario }}
          path: ray-diagnostics/
          if-no-files-found: warn
          retention-days: 14

      - name: Tear down Ray validation cluster
        if: always()
        run: docker compose -f docker-compose.ray.yml down -v --remove-orphans
