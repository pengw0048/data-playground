name: Secret scan

# Repository-owned secret detection so leaked credentials are caught in CI even
# before GitHub native secret scanning / push protection are confirmed enabled
# (those admin settings are documented in .github/SECURITY.md).
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
  # Release invokes the existing scan on the candidate revision instead of
  # treating a prior default-branch result as equivalent evidence.
  workflow_call:
    inputs:
      expected_sha:
        description: Immutable candidate commit to scan for a release gate.
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.expected_sha || github.sha }}
          # Full history so gitleaks can scan commits introduced on the branch.
          fetch-depth: 0
      - name: Run Gitleaks
        # Public repos do not require GITLEAKS_LICENSE. Do not add broad
        # allowlists here without an inline comment explaining each exception
        # (see .gitleaks.toml if one is introduced later).
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
