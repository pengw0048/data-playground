name: Dependency review

# Fails a PR that introduces a dependency with a known vulnerability at or above
# the severity threshold below. Reviews lockfile/manifest diffs only — does not
# open upgrade PRs (that policy is out of scope for #113).
on:
  pull_request:

permissions:
  contents: read
  # pull-requests: write lets the action comment a summary on the PR.
  pull-requests: write

concurrency:
  group: dependency-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Review dependency changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Dependency review
        # Severity threshold is deliberate and visible: fail on newly introduced
        # vulnerabilities of severity high or critical (medium/low are reported
        # but do not fail the job).
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
