# Data Playground — Postgres-backed, restart-durable shared-service reference setup.
#
# Follow the README's explicit migrate-then-start release sequence. A plain `docker compose up` never
# runs DDL. The app is served on http://localhost:8471 with metadata (users, canvases, run state,
# catalog) in Postgres. To run several stateless web instances, set `deploy.replicas` (or run more
# `kernel` services) behind a load balancer that sticky-routes /ws/collab/{canvas_id} by canvas id.
#
# Operator-owned (not provided by this file): network/firewall policy, IAM and secret-manager wiring,
# Postgres/storage durability and backups, resource quotas, TLS termination + cookies
# (`DP_AUTH_SECURE_COOKIE=1` behind HTTPS), and any high-availability topology. This is a reference
# composition, not a complete production deployment.
#
# Shared mode (DP_DEPLOYMENT_MODE=shared) fails closed unless Secure session cookies and an explicit
# transport declaration are set. Terminate TLS at a reverse proxy (prefer DP_TRUSTED_PROXIES=<proxy>)
# or at the hub (DP_AUTH_DIRECT_TLS=1). Plain HTTP browsers will not send Secure cookies — put TLS
# in front before exposing this beyond a laptop smoke test.
services:
  migrate:
    # Release tool only: `docker compose up` must never race this with an existing writer. Run it
    # explicitly, after stopping every metadata writer: `docker compose run --rm migrate`.
    profiles: ["tools"]
    image: "${DP_IMAGE:-dataplay:local}"
    build: .
    command: ["dataplay", "migrate", "--workspace", "/data"]
    environment:
      DP_DATABASE_URL: "postgresql+psycopg://dp:${DP_POSTGRES_PASSWORD:?set DP_POSTGRES_PASSWORD to a strong password, e.g. openssl rand -hex 32}@postgres:5432/dataplay"
      # Bootstrap is owned by this one-shot release step, never by an application replica. It is
      # required only until a login-capable admin exists; `run --rm` removes the transient container.
      DP_AUTH_SECRET: "${DP_AUTH_SECRET:?set DP_AUTH_SECRET to a random secret, e.g. openssl rand -hex 32}"
      DP_AUTH_PASSWORD: "${DP_AUTH_PASSWORD:-}"
    volumes:
      - dp-data:/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  kernel:
    # Use the same immutable DP_IMAGE tag or digest for the application and one-shot migrator.
    image: "${DP_IMAGE:-dataplay:local}"
    build: .
    ports:
      - "8471:8471"
    environment:
      # shared metadata DB → the web tier is stateless (run state + catalog + canvases all live here)
      DP_DATABASE_URL: "postgresql+psycopg://dp:${DP_POSTGRES_PASSWORD:?set DP_POSTGRES_PASSWORD to a strong password, e.g. openssl rand -hex 32}@postgres:5432/dataplay"
      # per-user auth (signed session cookies). REQUIRED — compose refuses to start without it, so
      # sessions can't be forged with a shipped default. Generate one: `openssl rand -hex 32`.
      DP_AUTH_SECRET: "${DP_AUTH_SECRET:?set DP_AUTH_SECRET to a random secret, e.g. openssl rand -hex 32}"
      # Shared-service transport guard (see README "Deployment modes"). Refuses startup without
      # Secure cookies plus either DP_AUTH_DIRECT_TLS=1 or DP_TRUSTED_PROXIES=<proxy-ip>[,...].
      DP_DEPLOYMENT_MODE: shared
      DP_AUTH_SECURE_COOKIE: "1"
      # Reference default: operator-terminated TLS at the hub edge. When a reverse proxy terminates
      # TLS instead, replace this with DP_TRUSTED_PROXIES listing that proxy (and drop DIRECT_TLS).
      DP_AUTH_DIRECT_TLS: "1"
      # multi-user: confine dataset reads to these roots (see kernel/hub/paths.py). The workspace
      # volume is /data; add more host roots you mount if users load datasets from them.
      DP_DATASET_ROOTS: "/data"
      # optional LLM agent — set a model + its key to enable the agent dock:
      # DP_AGENT_MODEL: "anthropic/claude-opus-4-8"
      # ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
    volumes:
      - dp-data:/data          # canvases/outputs/plugins + seeded sample datasets
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    # Digest-pinned (not a mutable :tag) so a pull can't silently change the image — resolve a new
    # digest with `docker buildx imagetools inspect postgres:16` (same pattern as the Dockerfile).
    image: postgres:16@sha256:be01cf82fc7dbba824acf0a82e150b4b360f3ff93c6631d7844af431e841a95c
    environment:
      POSTGRES_USER: dp
      POSTGRES_PASSWORD: "${DP_POSTGRES_PASSWORD:?set DP_POSTGRES_PASSWORD to a strong password, e.g. openssl rand -hex 32}"
      POSTGRES_DB: dataplay
    volumes:
      - dp-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dp -d dataplay"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  dp-data:
  dp-pg:
